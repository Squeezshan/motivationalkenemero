<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quotes for You 🧸</title>

    <meta name="description"
        content="A cute bear shares motivational quotes to brighten your day. Keep striving, darling! Padayon! 🌸">
    <meta property="og:title" content="Quotes for You 🧸">
    <meta property="og:description" content="A cute bear shares motivational quotes to brighten your day. Padayon!">
    <meta property="og:type" content="website">
    <meta property="og:image"
        content="https://images.unsplash.com/photo-1490750967868-8f52a0b2e2ce?ixlib=rb-4.0.3&auto=format&fit=crop&w=1200&q=80">

    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧸</text></svg>">

    <link
        href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Quicksand:wght@500&family=Fredoka:wght@500&display=swap"
        rel="stylesheet">

    <style>

        :root {
            --pink-primary: #d85a7f;
            --pink-border: #ffb6c1;
            --pink-shadow: rgba(255, 182, 193, 0.6);
            --pink-shadow-light: rgba(255, 182, 193, 0.4);
            --text-muted: #666;
            --bg-card: rgba(255, 255, 255, 0.85);
            --bg-bubble: white;
            --bg-gradient-start: #fce4ec;
            --bg-gradient-end: #f8bbd0;
            --font-title: 'Dancing Script', cursive;
            --font-body: 'Quicksand', sans-serif;
            --font-accent: 'Fredoka', sans-serif;
        }


        @media (prefers-color-scheme: dark) {
            :root {
                --pink-primary: #f48fb1;
                --pink-border: #ad1457;
                --pink-shadow: rgba(173, 20, 87, 0.4);
                --pink-shadow-light: rgba(173, 20, 87, 0.3);
                --text-muted: #ccc;
                --bg-card: rgba(30, 20, 25, 0.88);
                --bg-bubble: #2a1a22;
                --bg-gradient-start: #1a0a10;
                --bg-gradient-end: #2d1020;
            }
        }


        [data-theme="dark"] {
            --pink-primary: #f48fb1;
            --pink-border: #ad1457;
            --pink-shadow: rgba(173, 20, 87, 0.4);
            --pink-shadow-light: rgba(173, 20, 87, 0.3);
            --text-muted: #ccc;
            --bg-card: rgba(30, 20, 25, 0.88);
            --bg-bubble: #2a1a22;
            --bg-gradient-start: #1a0a10;
            --bg-gradient-end: #2d1020;
        }

        [data-theme="light"] {
            --pink-primary: #d85a7f;
            --pink-border: #ffb6c1;
            --pink-shadow: rgba(255, 182, 193, 0.6);
            --pink-shadow-light: rgba(255, 182, 193, 0.4);
            --text-muted: #666;
            --bg-card: rgba(255, 255, 255, 0.85);
            --bg-bubble: white;
            --bg-gradient-start: #fce4ec;
            --bg-gradient-end: #f8bbd0;
        }

        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            background: linear-gradient(135deg, var(--bg-gradient-start), var(--bg-gradient-end));
            background-image: url('https://images.unsplash.com/photo-1490750967868-8f52a0b2e2ce?ixlib=rb-4.0.3&auto=format&fit=crop&w=1920&q=80');
            background-size: cover;
            background-position: center;
            overflow: hidden;
            font-family: var(--font-body);
            transition: background-color 0.5s ease;
        }

        body::after {
            content: '';
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0);
            pointer-events: none;
            z-index: 0;
            transition: background 0.5s ease;
        }

        [data-theme="dark"] body::after {
            background: rgba(10, 5, 15, 0.65);
        }

        @media (prefers-color-scheme: dark) {
            html:not([data-theme="light"]) body::after {
                background: rgba(10, 5, 15, 0.65);
            }
        }

        .theme-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 100;
            background: var(--bg-card);
            border: 2px solid var(--pink-border);
            border-radius: 50%;
            width: 48px;
            height: 48px;
            font-size: 22px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 15px var(--pink-shadow-light);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .theme-toggle:hover {
            transform: scale(1.15) rotate(20deg);
            box-shadow: 0 6px 20px var(--pink-shadow);
        }

        .main-wrapper {
            display: grid;
            justify-items: center;
            position: relative;
            z-index: 10;
            width: 90%;
            max-width: 500px;
        }

        .quote-container {
            background-color: var(--bg-card);
            padding: 40px;
            border-radius: 25px;
            text-align: center;
            border: 3px solid var(--pink-border);
            box-shadow: 0 10px 30px var(--pink-shadow);
            margin-top: -10px;
            box-sizing: border-box;
            width: 100%;
            cursor: pointer;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .quote-container:hover {
            transform: translateY(-3px);
            box-shadow: 0 14px 40px var(--pink-shadow);
        }

        .quote-container:active {
            transform: scale(0.97);
        }

        h1 {
            font-family: var(--font-title);
            color: var(--pink-primary);
            font-size: 3.5rem;
            margin: 0;
            line-height: 1.2;
        }

        .quote-text {
            color: var(--text-muted);
            font-size: 1.2rem;
            margin-top: 15px;
            line-height: 1.5;
            transition: opacity 0.5s ease;
        }

        .quote-title {
            transition: opacity 0.5s ease;
        }

        .decorations {
            margin-top: 15px;
            user-select: none;
        }

        .bear-character {
            font-size: 80px;
            position: relative;
            line-height: 1;
            margin-bottom: -15px;
            z-index: 11;
            cursor: pointer;
            transition: transform 0.3s ease;
        }

        .bear-character:hover {
            transform: scale(1.1) rotate(-5deg);
        }

        .bear-character::before {
            content: '💖';
            font-size: 30px;
            position: absolute;
            bottom: 10px;
            left: 5px;
            transform: rotate(-15deg);
        }

        .thought-bubble {
            position: absolute;
            background: var(--bg-bubble);
            border: 3px solid var(--pink-border);
            border-radius: 50px;
            padding: 10px 20px;
            font-family: var(--font-accent);
            color: var(--pink-primary);
            font-size: 1.2rem;
            top: -50px;
            right: -90px;
            box-shadow: 0 5px 15px var(--pink-shadow-light);
            z-index: 12;
            white-space: nowrap;
            transition: opacity 0.4s ease;
        }

        .thought-bubble::after,
        .thought-bubble::before {
            content: '';
            position: absolute;
            background: var(--bg-bubble);
            border: 3px solid var(--pink-border);
            border-radius: 50%;
        }

        .thought-bubble::after {
            width: 15px;
            height: 15px;
            bottom: -15px;
            left: 20px;
        }

        .thought-bubble::before {
            width: 8px;
            height: 8px;
            bottom: -22px;
            left: 10px;
        }

        .floating-item {
            position: fixed;
            bottom: -50px;
            z-index: 1;
            pointer-events: none;
            animation: floatUp linear forwards;
            will-change: transform, opacity;
        }

        @keyframes floatUp {
            0% {
                transform: translateY(0) rotate(0deg);
                opacity: 1;
            }

            100% {
                transform: translateY(-120vh) rotate(360deg);
                opacity: 0;
            }
        }

        .peek-bear {
            position: fixed;
            top: 55%;
            transform: translateY(-50%);
            font-size: 140px;
            z-index: 12;
            opacity: 0.95;
            pointer-events: none;
            line-height: 1;
        }

        .peek-bear.left {
            left: -250px;
            animation: peekLeft 5s ease-in-out infinite 3.5s;
        }

        .peek-bear.right {
            right: -250px;
            animation: peekRight 5s ease-in-out infinite 3.5s;
        }

        @keyframes peekLeft {

            0%,
            100% {
                left: -150px;
                transform: translateY(-50%) rotate(20deg);
            }

            15%,
            35% {
                left: -65px;
                transform: translateY(-50%) rotate(30deg);
            }
        }

        @keyframes peekRight {

            0%,
            100% {
                right: -150px;
                transform: translateY(-50%) rotate(-20deg) scaleX(-1);
            }

            15%,
            35% {
                right: -65px;
                transform: translateY(-50%) rotate(-30deg) scaleX(-1);
            }
        }

        .heart-burst {
            position: fixed;
            pointer-events: none;
            z-index: 200;
            font-size: 24px;
            animation: burstUp 1s ease-out forwards;
            will-change: transform, opacity;
        }

        @keyframes burstUp {
            0% {
                transform: translate(0, 0) scale(1);
                opacity: 1;
            }

            100% {
                transform: translate(var(--dx), var(--dy)) scale(0.3);
                opacity: 0;
            }
        }

        .tap-hint {
            margin-top: 14px;
            font-size: 0.82rem;
            color: var(--text-muted);
            opacity: 0.6;
            letter-spacing: 0.3px;
            user-select: none;
        }

        @media (prefers-reduced-motion: reduce) {

            .floating-item,
            .peek-bear.left,
            .peek-bear.right,
            .heart-burst {
                animation: none !important;
            }

            .quote-container,
            .bear-character,
            .theme-toggle {
                transition: none !important;
            }

            .floating-item {
                display: none;
            }
        }

        @media (max-width: 600px) {
            .quote-container {
                padding: 25px 20px;
            }

            h1 {
                font-size: 2.2rem;
            }

            .quote-text {
                font-size: 1rem;
            }

            .bear-character {
                font-size: 60px;
                margin-bottom: -10px;
            }

            .bear-character::before {
                font-size: 22px;
                bottom: 5px;
            }

            .thought-bubble {
                font-size: 1rem;
                top: -45px;
                right: -40px;
                padding: 5px 15px;
            }

            .peek-bear {
                font-size: 80px;
            }

            .peek-bear.left {
                animation-name: peekLeftMobile;
            }

            .peek-bear.right {
                animation-name: peekRightMobile;
            }

            .theme-toggle {
                width: 40px;
                height: 40px;
                font-size: 18px;
                top: 14px;
                right: 14px;
            }
        }

        @keyframes peekLeftMobile {

            0%,
            100% {
                left: -100px;
                transform: translateY(-50%) rotate(20deg);
            }

            15%,
            35% {
                left: -30px;
                transform: translateY(-50%) rotate(30deg);
            }
        }

        @keyframes peekRightMobile {

            0%,
            100% {
                right: -100px;
                transform: translateY(-50%) rotate(-20deg) scaleX(-1);
            }

            15%,
            35% {
                right: -30px;
                transform: translateY(-50%) rotate(-30deg) scaleX(-1);
            }
        }
    </style>
</head>

<body>

    <button class="theme-toggle" id="themeToggle" aria-label="Toggle dark mode" title="Toggle dark mode">🌙</button>

    <div class="peek-bear left" aria-hidden="true">🧸</div>
    <div class="peek-bear right" aria-hidden="true">🧸</div>

    <div class="main-wrapper">
        <div class="bear-character" role="img" aria-label="Teddy bear mascot holding a heart" id="bearCharacter">
            🧸
            <div class="thought-bubble" aria-label="Bear says Padayon!">
                <span lang="fil">Padayon!</span>
            </div>
        </div>
        <figure class="quote-container" id="quoteContainer" role="figure"
            aria-label="Motivational quote card — click for a new quote">
            <blockquote>
                <h1 class="quote-title" id="quoteTitle">"Keep on striving, darling"</h1>
                <p class="quote-text" id="quoteText">"May your desire to chase your dreams always be stronger than your
                    fear of trying."</p>
            </blockquote>
            <div class="decorations" aria-hidden="true">✨ 🌸 🎀 🌸 ✨</div>
            <div class="tap-hint">tap for a new quote ✨</div>
        </figure>
    </div>

    <script>
        const quotes = [
            { title: "Keep on striving, darling", text: "May your desire to chase your dreams always be stronger than your fear of trying." },
            { title: "You are enough", text: "You don't have to prove anything to anyone. You are worthy just by being you." },
            { title: "Bloom at your own pace", text: "A flower doesn't think of competing with the flower next to it. It just blooms." },
            { title: "Brighter days ahead", text: "When it rains, look for rainbows. When it's dark, look for stars." },
            { title: "Be kind to yourself", text: "Talk to yourself like someone you love. You deserve your own compassion." },
            { title: "Courage, darling", text: "She believed she could, so she did. And if she couldn't, she tried again." },
            { title: "You're doing great", text: "Progress is still progress, no matter how small. Be proud of how far you've come." },
            { title: "Never give up", text: "The moment you want to quit is the moment you need to keep pushing. You've got this!" },
            { title: "Shine on, beautiful", text: "Your light is needed in this world. Don't let anyone dim your sparkle." },
            { title: "Dream big, start small", text: "Every big achievement was once an impossible dream. Take that first step today." },
            { title: "Stay soft, stay strong", text: "Softness is not weakness. The strongest hearts are the ones that still choose kindness." },
            { title: "It's okay to rest", text: "Resting is not quitting. Sometimes the bravest thing you can do is pause and breathe." },
        ];

        const cuteThings = ['🎀', '💖', '🌸', '✨', '💕', '🧸', '🦋', '💗'];
        const heartEmojis = ['💖', '💗', '💕', '❤️', '🩷', '✨', '🌸'];
        const bubbleMessages = ['Padayon!', 'You got this!', 'Laban! 💪', 'Kaya mo!', 'I love you!', 'Smile! 😊', 'Go go go! 🎀'];

        let currentQuoteIndex = 0;
        const quoteTitle = document.getElementById('quoteTitle');
        const quoteText = document.getElementById('quoteText');
        const quoteContainer = document.getElementById('quoteContainer');
        const thoughtBubble = document.querySelector('.thought-bubble');

        function getNextQuote() {
            let nextIndex;
            do {
                nextIndex = Math.floor(Math.random() * quotes.length);
            } while (nextIndex === currentQuoteIndex && quotes.length > 1);
            currentQuoteIndex = nextIndex;
            return quotes[nextIndex];
        }

        function changeQuote() {
            const quote = getNextQuote();
            quoteTitle.style.opacity = '0';
            quoteText.style.opacity = '0';

            setTimeout(() => {
                quoteTitle.textContent = `"${quote.title}"`;
                quoteText.textContent = `"${quote.text}"`;
                quoteTitle.style.opacity = '1';
                quoteText.style.opacity = '1';
            }, 350);
            thoughtBubble.textContent = bubbleMessages[Math.floor(Math.random() * bubbleMessages.length)];
        }

        quoteContainer.addEventListener('click', (e) => {
            changeQuote();
            spawnHeartBurst(e.clientX, e.clientY);
        });
        const bearCharacter = document.getElementById('bearCharacter');
        bearCharacter.addEventListener('click', (e) => {
            e.stopPropagation();
            spawnHeartBurst(e.clientX, e.clientY, 12);
            bearCharacter.style.transform = 'scale(1.3) rotate(10deg)';
            setTimeout(() => { bearCharacter.style.transform = ''; }, 400);
        });

        function spawnHeartBurst(x, y, count = 7) {
            for (let i = 0; i < count; i++) {
                const heart = document.createElement('div');
                heart.className = 'heart-burst';
                heart.textContent = heartEmojis[Math.floor(Math.random() * heartEmojis.length)];
                const angle = (Math.PI * 2 * i) / count + (Math.random() * 0.5 - 0.25);
                const distance = 60 + Math.random() * 80;
                const dx = Math.cos(angle) * distance;
                const dy = Math.sin(angle) * distance - 40;
                heart.style.left = x + 'px';
                heart.style.top = y + 'px';
                heart.style.setProperty('--dx', dx + 'px');
                heart.style.setProperty('--dy', dy + 'px');
                heart.style.fontSize = (18 + Math.random() * 16) + 'px';

                document.body.appendChild(heart);
                setTimeout(() => heart.remove(), 1000);
            }
        }
        function createFloatingItem() {
            const item = document.createElement('div');
            item.classList.add('floating-item');
            item.innerText = cuteThings[Math.floor(Math.random() * cuteThings.length)];
            item.style.left = Math.random() * 100 + 'vw';

            const opacities = [0.4, 0.6, 0.8];
            item.style.opacity = opacities[Math.floor(Math.random() * opacities.length)];

            item.style.fontSize = (Math.random() * 20 + 15) + 'px';
            const duration = Math.random() * 5 + 5;
            item.style.animationDuration = duration + 's';

            document.body.appendChild(item);

            setTimeout(() => {
                item.remove();
            }, duration * 1000);
        }

        setInterval(createFloatingItem, 500);
        const themeToggle = document.getElementById('themeToggle');

        function setTheme(theme) {
            document.documentElement.setAttribute('data-theme', theme);
            themeToggle.textContent = theme === 'dark' ? '☀️' : '🌙';
            localStorage.setItem('theme', theme);
        }
        const savedTheme = localStorage.getItem('theme');
        if (savedTheme) {
            setTheme(savedTheme);
        }

        themeToggle.addEventListener('click', () => {
            const current = document.documentElement.getAttribute('data-theme');
            if (current === 'dark') {
                setTheme('light');
            } else {
                setTheme('dark');
            }
            spawnHeartBurst(
                themeToggle.getBoundingClientRect().left + 20,
                themeToggle.getBoundingClientRect().top + 20,
                5
            );
        });
    </script>

</body>

</html>
